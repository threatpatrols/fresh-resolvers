name: refresh-resolvers

on:
  schedule:
    # 01:35 UTC
    - cron:  "1 35 * * *"

jobs:
  refresh-list:
    runs-on: ubuntu-22.04

    concurrency:
      group: refresh-list-job
      cancel-in-progress: false

    steps:

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Checkout DNS Validator
        uses: actions/checkout@v4
        with:
          repository: 'vortexau/dnsvalidator'
          path: dnsvalidator
    
      - name: Install DNS Validator
        run: |
          cd dnsvalidator
          python3 setup.py install
      
      - name: Current UTC timestamp
        run: |
          TIMESTAMP_NOW=$(date --utc +'%Y-%m-%dT%H:%M:%S%z') && echo ${TIMESTAMP_NOW}
          echo "TIMESTAMP_NOW=${TIMESTAMP_NOW}" >> $GITHUB_ENV
          echo "MAX_RESOLVERS=100" >> $GITHUB_ENV
          echo "COUNTRY_CODES=AE AU BH BR CA CH CN DE ES FR HK ID IE IL IN IT JP KR SE SG UK US ZA" >> $GITHUB_ENV

      - name: Generate new resolvers
        run: |
          rm -Rf data/resolvers*
          wget --quiet -O /tmp/nameservers.csv "https://public-dns.info/nameservers.csv"
          for COUNTRY_CODE in ${COUNTRY_CODES}; do
            echo "==="
            echo "Resolvers for ${COUNTRY_CODE}..."
            echo "0.0.0.0" > /tmp/resolvers-${COUNTRY_CODE}.tmp  # expected to be filtered out by dnsvalidator
            # NB: errors in the form "sort: write failed: 'standard output': Broken pipe" are harmless
            cat /tmp/nameservers.csv | grep -v '#' | grep ",${COUNTRY_CODE}," | grep ',true,1.00.20' | cut -d',' -f1 | grep -v ':' | grep '.' | sort --random-sort | head -n ${MAX_RESOLVERS} >> /tmp/resolvers-${COUNTRY_CODE}.tmp
            dnsvalidator -tL /tmp/resolvers-${COUNTRY_CODE}.tmp -threads 30 --silent > data/resolvers-${COUNTRY_CODE}.txt
            echo -n "Total ${COUNTRY_CODE} resolvers: "
            cat data/resolvers-${COUNTRY_CODE}.txt | wc -l
          done

      - name: Commit changes
        run: |
          git config --local user.email "bot@threatpatrols.com"
          git config --local user.name "github-actions[bot]"
          git add data/resolvers-*
          git commit -m "${TIMESTAMP_NOW} update"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
