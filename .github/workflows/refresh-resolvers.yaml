name: refresh-resolvers

on:
  schedule:
    # 01:35 UTC
    - cron:  "35 1 */2 * *"

jobs:
  refresh-list:
    runs-on: ubuntu-22.04

    concurrency:
      group: refresh-list-job
      cancel-in-progress: false

    steps:

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Checkout DNS Validator
        uses: actions/checkout@v4
        with:
          repository: 'vortexau/dnsvalidator'
          path: dnsvalidator
    
      - name: Install DNS Validator
        run: |
          cd dnsvalidator
          python3 setup.py install
      
      - name: Configure variables
        run: |
          TIMESTAMP_NOW=$(date --utc +'%Y-%m-%dT%H:%M:%S%z') && echo ${TIMESTAMP_NOW}
          echo "TIMESTAMP_NOW=${TIMESTAMP_NOW}" >> $GITHUB_ENV
          echo "RESOLVERS_PATH=resolvers" >> $GITHUB_ENV
          echo "MAX_RESOLVERS=100" >> $GITHUB_ENV
          echo "SOURCE_URL=https://public-dns.info/nameservers.csv" >> $GITHUB_ENV
          echo "COUNTRY_CODES=AE AU BH BR CA CH CN DE ES FR HK ID IE IL IN IT JP KR SE SG UK US ZA" >> $GITHUB_ENV

      - name: Generate new resolvers
        run: |
          rm -f ${RESOLVERS_PATH}/*.txt
          wget --quiet -O /tmp/nameservers.csv "${SOURCE_URL}"
          for COUNTRY_CODE in ${COUNTRY_CODES}; do
            echo "==="
            echo "Resolvers for ${COUNTRY_CODE}..."

            # poor mans random, because /dev/urandom is (maybe?) weird here; and we don't need crypto strong random
            date --iso-8601=ns | sha512sum | cut -d' ' -f1 | base64 -w0 | head -c 160 | rev | base64 -d > /tmp/poor-mans-random
          
            # NB: errors in the form "sort: write failed: 'standard output': Broken pipe" are harmless
            cat /tmp/nameservers.csv | grep -v '#' | grep ",${COUNTRY_CODE}," | grep ',true,1.00.20' | cut -d',' -f1 | grep -v ':' | grep '.' | sort --random-sort --random-source /tmp/poor-mans-random | head -n ${MAX_RESOLVERS} >> /tmp/resolvers-${COUNTRY_CODE}.tmp
          
            # shuffle
            sort --random-sort --random-source /tmp/poor-mans-random /tmp/resolvers-${COUNTRY_CODE}.tmp > /tmp/resolvers-${COUNTRY_CODE}.random
          
            # dnsvalidator
            dnsvalidator -tL /tmp/resolvers-${COUNTRY_CODE}.random -threads 30 --silent > ${RESOLVERS_PATH}/resolvers-${COUNTRY_CODE}.txt
          
            RESOLVERS_TOTAL=$(cat ${RESOLVERS_PATH}/resolvers-${COUNTRY_CODE}.txt | wc -l)
            echo -n "Total ${COUNTRY_CODE} resolvers: ${RESOLVERS_TOTAL}"
            
            if [ ${RESOLVERS_TOTAL} -lt 1 ]; then
              rm -f ${RESOLVERS_PATH}/resolvers-${COUNTRY_CODE}.txt
            fi
          
          done

      - name: Commit changes
        run: |
          git config --local user.email "bot@threatpatrols.com"
          git config --local user.name "github-actions[bot]"
          git add ${RESOLVERS_PATH}/*.txt
          git commit -m "${TIMESTAMP_NOW} update"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
